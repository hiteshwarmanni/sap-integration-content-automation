
applications:
  - name: intops-server
    random-route: false
    routes:
      - route: intops-server.cfapps.eu10-004.hana.ondemand.com
    path: .
    buildpacks:
      - nodejs_buildpack
    memory: 1G
    disk_quota: 1G
    instances: 1
    command: npm start
    health-check-type: http
    health-check-http-endpoint: /health
    timeout: 180
    env:
      NODE_ENV: production
      BEHIND_APPROUTER: "true"
      # Cleanup job schedule (UTC timezone)
      # Format: <DAILY/WEEKLY/MONTHLY> <HH>
      # DAILY HH - Runs every day at specified hour (00-23)
      # WEEKLY HH - Runs every Sunday at specified hour (00-23)
      # MONTHLY HH - Runs 1st of every month at specified hour (00-23)
      CLEANUP_SCHEDULE_UTC: "DAILY 00"
      # Number of months to retain logs before cleanup
      # Examples: 6 (6 months), 12 (1 year), 24 (2 years)
      RETENTION_MONTHS: "12"
    services:
      - intops_db
      - intops_xsuaa
      - cloud-logging-cloud-logging


  - name: intops-app
    path: approuter
    buildpacks:
      - nodejs_buildpack
    memory: 1G
    disk_quota: 1G
    instances: 1
    routes:
      - route: intops-app.cfapps.eu10-004.hana.ondemand.com
    env:
      destinations: '[{"name":"backend","url":"https://intops-server.cfapps.eu10-004.hana.ondemand.com","forwardAuthToken":true}]'
    services:
      - intops_xsuaa
      - intops_db
      - cloud-logging-cloud-logging
    health-check-type: http
    health-check-http-endpoint: /health
